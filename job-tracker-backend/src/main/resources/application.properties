spring.application.name=job-tracker-backend
spring.profiles.active=dev

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/job_tracker?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.url=jdbc:mysql://localhost:3306/job_tracker?createDatabaseIfNotExist=true
spring.flyway.user=${DB_USERNAME:root}
spring.flyway.password=${DB_PASSWORD:password}
spring.flyway.baseline-on-migrate=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:your_super_secret_jwt_key_here}
app.jwt.expiration-ms=86400000

# Server Configuration
server.port=8080
server.error.include-message=always
