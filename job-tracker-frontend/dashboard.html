<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobTracker Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <div class="app-layout">

      <aside class="sidebar glass-panel">
        <div class="brand">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="paint0_linear" x1="3" y1="2" x2="21" y2="20" gradientUnits="userSpaceOnUse">
                <stop stop-color="#3b82f6"/>
                <stop offset="1" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="text-gradient hover:opacity-80 transition" style="cursor: pointer;">JobTracker</span>
        </div>

        <nav class="nav-menu delay-1 animate-fade-in">
          <a href="dashboard.html" class="nav-item active">
            Dashboard
          </a>
          <a href="applications.html" class="nav-item">
            Applications
          </a>
          
          <div style="flex-grow: 1;"></div>
          
          <button onclick="logout()" class="nav-item" style="color: var(--status-rejected); margin-top: auto;">
            Log Out Exit
          </button>
        </nav>
      </aside>

      <main class="main-content">
        <header class="mb-8 delay-1 animate-fade-in flex justify-between items-center">
          <div>
            <h1 class="text-3xl mb-1">Dashboard</h1>
            <p class="text-muted">Welcome back, <span id="username" class="text-gradient font-semibold"></span></p>
          </div>
        </header>

        <div class="stats-grid delay-2 animate-fade-in">
          <div class="glass-card stat-card" style="border-top: 2px solid var(--text-main);">
            <p class="stat-label">Total Applications</p>
            <h2 id="total" class="stat-value">0</h2>
          </div>

          <div class="glass-card stat-card" style="border-top: 2px solid var(--status-interview);">
            <p class="stat-label">Interviews</p>
            <h2 id="interviews" class="stat-value text-gradient">0</h2>
          </div>

          <div class="glass-card stat-card" style="border-top: 2px solid var(--status-offer);">
            <p class="stat-label">Offers</p>
            <h2 id="offers" class="stat-value" style="color: var(--status-offer);">0</h2>
          </div>

          <div class="glass-card stat-card" style="border-top: 2px solid var(--status-rejected);">
            <p class="stat-label">Rejected</p>
            <h2 id="rejected" class="stat-value" style="color: var(--status-rejected);">0</h2>
          </div>
        </div>
      </main>
    </div>

    <script src="js/api.js"></script>
    <script>
      async function loadStats() {
        try {
          const stats = await apiRequest("/applications/stats");
          animateValue("total", 0, stats.totalApplications || 0, 1000);
          animateValue("interviews", 0, stats.interviews || 0, 1000);
          animateValue("offers", 0, stats.offers || 0, 1000);
          animateValue("rejected", 0, stats.rejections || 0, 1000);
        } catch (e) {
          console.log("Stats API not ready", e);
        }
      }

      function loadUser() {
        const name = localStorage.getItem("username") || "Explorer";
        document.getElementById("username").innerText = name;
      }
      
      function animateValue(id, start, end, duration) {
        if (start === end) { document.getElementById(id).innerText = end; return; }
        let current = start;
        let range = end - start;
        let increment = end > start ? 1 : -1;
        let stepTime = Math.abs(Math.floor(duration / range));
        let obj = document.getElementById(id);
        let timer = setInterval(function() {
            current += increment;
            obj.innerText = current;
            if (current == end) { clearInterval(timer); }
        }, stepTime);
      }

      document.addEventListener("DOMContentLoaded", () => {
        loadStats();
        loadUser();
      });
    </script>
  </body>
</html>
